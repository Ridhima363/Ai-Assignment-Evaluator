<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-green-400 to-blue-500 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-2xl w-96">
        <h2 class="text-3xl font-bold mb-6 text-center text-gray-800">Login</h2>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-6 space-y-2">
                    {% for category, message in messages %}
                        <div class="p-3 rounded-md text-center text-sm
                            {% if category == 'danger' %} bg-red-100 text-red-700 border border-red-500
                            {% elif category == 'success' %} bg-green-100 text-green-700 border border-green-500
                            {% elif category == 'warning' %} bg-yellow-100 text-yellow-700 border border-yellow-500
                            {% else %} bg-gray-100 text-gray-700 {% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-5">
            <input type="email" name="email" placeholder="Email"
                   class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 transition duration-300" required>

            <input type="password" name="password" placeholder="Password"
                   class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 transition duration-300" required>

            <button type="submit" class="w-full bg-blue-500 text-white p-3 rounded-md font-semibold hover:bg-blue-600 transform hover:scale-105 transition duration-300">Login</button>
        </form>
        <p class="mt-4 text-center text-gray-600">Don't have an account? <a href="/signup" class="text-blue-500 hover:underline">Signup</a></p>
    </div>
</body>
</html>
